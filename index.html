<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carpet & Upholstery CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css?v=7" />
  <link rel="stylesheet" href="css/print.css?v=7" media="print" />
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">CU</div>
      <div class="brand-text">
        <div class="brand-title">Carpet &amp; Upholstery</div>
        <div class="brand-sub">CRM</div>
      </div>
    </div>

    <nav class="nav">
      <a class="nav-item active" data-route="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l9-9 9 9"/><path d="M5 10v10h14V10"/></svg>
        <span>Dashboard</span>
      </a>
      <a class="nav-item" data-route="customers">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21c0-4 4-7 8-7s8 3 8 7"/></svg>
        <span>Customers</span>
      </a>
      <a class="nav-item" data-route="jobs">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="6" height="14" rx="1"/><rect x="11" y="5" width="6" height="14" rx="1"/><rect x="19" y="5" width="2" height="14" rx="1"/></svg>
        <span>Jobs</span>
      </a>
      <a class="nav-item" data-route="calendar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>
        <span>Calendar</span>
      </a>
      <a class="nav-item" data-route="companies">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 21h18M5 21V7l7-4 7 4v14M9 9h2M9 13h2M9 17h2M13 9h2M13 13h2M13 17h2"/></svg>
        <span>Companies</span>
      </a>
    </nav>

    <div class="sidebar-foot">
      <button class="ghost-btn" id="export-btn" title="Export all data">Export</button>
      <button class="ghost-btn" id="import-btn" title="Import data">Import</button>
      <input type="file" id="import-file" accept="application/json" hidden />
    </div>
    <div class="sidebar-foot" style="border-top:none;padding-top:0;">
      <button class="ghost-btn" id="signout-btn" style="flex:1;" title="Sign out">Sign out</button>
    </div>
    <div id="user-email" class="user-email"></div>
  </aside>

  <main class="main">
    <header class="topbar">
      <h1 id="page-title">Dashboard</h1>
      <div class="topbar-actions" id="page-actions"></div>
      <button class="btn-icon mobile-only" id="mobile-signout" title="Sign out" aria-label="Sign out">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
      </button>
    </header>

    <section class="page" id="page-dashboard"></section>
    <section class="page hidden" id="page-customers"></section>
    <section class="page hidden" id="page-jobs"></section>
    <section class="page hidden" id="page-calendar"></section>
    <section class="page hidden" id="page-companies"></section>
  </main>

  <div class="modal-root" id="modal-root"></div>
  <div class="toast-root" id="toast-root"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/config.js?v=9"></script>
  <script src="js/supa.js?v=9"></script>
  <script src="js/storage.js?v=9"></script>
  <script src="js/ui.js?v=9"></script>
  <script src="js/auth.js?v=9"></script>
  <script src="js/customers.js?v=9"></script>
  <script src="js/jobs.js?v=9"></script>
  <script src="js/calendar.js?v=9"></script>
  <script src="js/companies.js?v=9"></script>
  <script src="js/dashboard.js?v=9"></script>
  <script src="js/quote.js?v=9"></script>
  <script src="js/app.js?v=9"></script>
</body>
</html>
